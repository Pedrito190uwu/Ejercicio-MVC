<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Frutas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body class="container mt-5">

    <h1 th:text="${titulo}"></h1>
    <p class="text-muted" th:text="${mensaje}"></p>

    <table class="table table-bordered mt-3">
        <thead class="table-dark">
            <tr>
                <th>Fruta</th>
                <th>Color</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="fruta : ${frutas}">
                <td th:text="${fruta.nombre}"></td>
                <td th:text="${fruta.color}"></td>
            </tr>
        </tbody>
    </table>

</body>
